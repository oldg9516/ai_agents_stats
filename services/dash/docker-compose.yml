services:
  dash:
    build: .
    ports:
      - "${PORT:-9000}:${PORT:-9000}"
    environment:
      - AGENT_DB_URL=${AGENT_DB_URL}
      - DATA_DB_URL=${DATA_DB_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=${PORT:-9000}
      - AGENT_MODE=${AGENT_MODE:-full}
      - AGENT_ID=${AGENT_ID:-dash}
      - KNOWLEDGE_TABLE_PREFIX=${KNOWLEDGE_TABLE_PREFIX:-dash}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-9000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
