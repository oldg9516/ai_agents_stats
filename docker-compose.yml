services:
  dash:
    build: ./services/dash
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - AGENT_DB_URL=${DASH_AGENT_DB_URL}
      - DATA_DB_URL=${DASH_DATA_DB_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=9000
      - AGENT_MODE=full
      - AGENT_ID=dash
      - KNOWLEDGE_TABLE_PREFIX=dash
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

